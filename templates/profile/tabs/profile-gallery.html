<main class="dashboard">
    {% if not artwork_list %}
        <div class="no-artworks">
            {% if request.user == user %}
                <h2>Bring your gallery to life</h2>
                <a href="{% url 'create-artwork' %}" class="btn-create">Create Artwork</a>
            {% else %}
                <h3>This user hasn't shared any artworks yet.</h3>
            {% endif %}
        </div>
    {% else %}
        <section class="artworks-container">
            {% for artwork in artwork_list %}
                <div class="wrap-image">
                    <a href="{% url 'artwork-details' artwork.pk %}"><img class="art-image" src="{{ artwork.image_url }}">
                        <p class="overlay">More Info</p>
                    </a>
                </div>
            {% endfor %}
        </section>
    {% endif %}
</main>
