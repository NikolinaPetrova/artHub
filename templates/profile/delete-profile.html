{% extends 'base.html' %}
{% block content %}

        <main class="profile-form content">
        <form method="post">
            {% csrf_token %}
            <h1>Are you sure you want to delete your profile?</h1>
            <div class="buttons confirm-btn">
                <button type="Submit" name="confirm" value="yes">Yes</button>
                <a href="{% url 'profile-details' user.pk %}">No</a>
            </div>
        </form>
        </main>

{% endblock %}
