{% extends 'base.html' %}
{% block content %}

    <main class="profile-form content-sidebar">
        <form method="post" enctype="multipart/form-data">
            <div id="edit-page">
                <h1>Edit Profile</h1>
                    {{ form }}
                    {% csrf_token %}
                <div class="buttons">
                    <button class='form-button' type="submit">Submit</button>
                </div>
            </div>
        </form>
    </main>

{% endblock %}
