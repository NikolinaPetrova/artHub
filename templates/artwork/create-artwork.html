{% extends 'base.html' %}
{% block content %}

    <main class="artwork-create">
        <form method="">
            <div id="create-page">
                <h1>Create Artwork</h1>
                <div>
                    <label for="id_title">Title</label>
                    <input type="text" name="title" id="id_title" required>
                </div>

                <div>
                    <label for="id_description">Description</label>
                    <textarea type="text" name="description" id="id_description"></textarea>
                </div>

                <div>
                    <label for="id_type">Artwork Type</label>
                    <select name="type" required id="id_type">
                        <option value="">---------</option>

                        <option value="Digital">Digital</option>

                        <option value="Painting">Painting</option>

                        <option value="Drawing">Drawing</option>

                        <option value="Photography">Photography</option>

                        <option value="Other">Other</option>
                    </select>
                </div>

                <div>
                    <label for="id_image_url">Image Url</label>
                    <input type="url" name="image_url" id="id_image_url">
                </div>

                <div>
                    <label for="id_collection">Collection</label>
                    <input type="text" name="collection" id="id_collection">
                </div>
                <div class="buttons">
                    <button class='form-button' type="submit">Submit</button>
                </div>
            </div>
        </form>
    </main>

{% endblock %}
