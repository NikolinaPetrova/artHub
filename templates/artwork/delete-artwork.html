{% extends 'base.html' %}
{% block content %}

        <main class="artwork-form content">
        <form method="post">
            <div id="delete-page">
                <h1>Delete Artwork</h1>
                {% csrf_token %}
                {{ form }}
                <h4>Are you sure you want to delete this artwork?</h4>
                <div class="buttons">
                    <button type="Submit" name="confirm" value="yes">Yes</button>
                    <button type="Submit" name="confirm" value="no">No</button>
                </div>
            </div>
        </form>
        </main>

{% endblock %}
