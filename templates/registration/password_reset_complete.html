{% extends 'base.html' %}
{% block content %}

    <main class="password-change-done content-sidebar">
        <section class="auth-card auth-card-message">
            <h2>Password reset successful</h2>
            <p>
                Your password has been changed successfully. You can now sign in with your new password.
            </p>

            <div class="auth-actions">
                <a href="{% url 'login' %}" class="btn-create">Go to sign in</a>
            </div>
        </section>
    </main>

{% endblock %}
