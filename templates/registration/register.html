{% extends 'base.html' %}
{% block content %}
    <main class="profile-form">
        <form method="post" enctype="multipart/form-data">
            <div id="create-page">
                <h1>Create an account</h1>
                {{ form }}
                {% csrf_token %}
                <div class="buttons">
                    <button class='form-button' type="submit">Register</button>
                </div>
            </div>
        </form>
    </main>
{% endblock %}
