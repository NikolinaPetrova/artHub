{% extends 'base.html' %}
{% block content %}
    <main class="profile-form content-sidebar">
        <form method="post">
            <div id="create-page">
                <h1>Login</h1>
                {{ form }}
                {% csrf_token %}
                <div class="buttons login-buttons">
                    <button class='form-button' type="submit">Submit</button>
                    <p>Don't have an account? <a href="{% url 'register' %}">Register here</a></p>
                    <p>Forgot your password? <a href="{% url 'password_reset' %}">Click here to reset it.</a></p>
                </div>
            </div>
        </form>
    </main>
{% endblock %}
