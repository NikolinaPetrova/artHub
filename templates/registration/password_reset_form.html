{% extends 'base.html' %}
{% block content %}
    <main class="profile-form content-sidebar">
        <form method="post">
            <div id="create-page">
                <h1>Reset Password</h1>
                <p>Enter your email address and we’ll send you a link to reset your password.</p>
                {% csrf_token %}
                {{ form }}
                <div class="buttons login-buttons">
                    <button class="form-button" type="submit">Send Reset Link</button>
                </div>
            </div>
        </form>
    </main>
{% endblock %}
