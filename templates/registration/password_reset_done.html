{% extends 'base.html' %}
{% block content %}
    <main class="password-change-done content-sidebar">
        <section class="auth-card auth-card-message">
            <h2>Check your email</h2>
            <p>If an account with that email exists, we’ve sent a password reset link. Please check your inbox and follow the instructions.</p>
            <p class="auth-muted">If you don’t see the message, check your spam folder too.</p>
            <div class="auth-actions">
                <a href="{% url 'login' %}" class="btn-create">Back to sign in</a>
            </div>
        </section>
    </main>
{% endblock %}
