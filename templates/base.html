{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtHub</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
    <aside class="sidebar collapsed">
        <ul>
            <li>
                <a class="menu-btn"><span class="icon" title="Menu"><i class="fa-solid fa-bars"></i></span> <span class="text">Menu</span></a>
            </li>
            <li>
                <a href="{% url 'home' %}"><span class="icon" title="Home"><i class="fa-regular fa-house"></i></span> <span class="text">Home</span></a>
            </li>
            <li>
                <a href="{% url 'gallery' %}"><span class="icon" title="Gallery"><i class="fa-solid fa-palette"></i></span> <span class="text">Gallery</span></a>
            </li>
            <li>
                <a href="{% url 'create-artwork' %}"><span class="icon" title="Add Artwork"><i class="fa-solid fa-paintbrush"></i></span> <span class="text">Add Artwork</span></a>
            </li>
            <li>
                <a href="{% url 'create-group' %}"><span class="icon" title="Create Group"><i class="fa-solid fa-plus"></i></span> <span class="text">Create Group</span></a>
            </li>
            <li>
                <a href="#"><span class="icon" title="Browse Groups"><i class="fa-solid fa-people-group"></i></span> <span class="text">Browse Groups</span></a>
            </li>
        </ul>
    </aside>
    <header class="top-nav">
        <div class="logo-menu">
            <a href="{% url 'home' %}" class="logo">ArtHub</a>
        </div>

        <form action="{% url 'gallery' %}" method="get" class="search-form">
            <div class="search-bar">
                <input type="search" name="q" placeholder="Search artworks by title or tag..." value="{{ request.GET.q }}">
                <button type="submit"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>
        </form>

        {% if request.user.is_authenticated %}
        <ul class="nav-links">
            <li class="dropdown">
                <a><i class="fa-regular fa-bell"><span id="notification-count"></span></i></a>
                <ul class="dropdown-menu" style="display: none">

                </ul>
            </li>
            <li><a href="{% url 'profile-details' request.user.pk %}" title="Account"><i class="fa-regular fa-circle-user"></i></a></li>
            <li>
                <form method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button class="logout-btn" title="Log out"><i class="fa-solid fa-arrow-right-from-bracket"></i></button>
                </form>
            </li>
        </ul>
        {% else %}
            <ul class="nav-links">
                <li><a href="{% url 'login' %}">Login</a></li>
                <li><a href="{% url 'register' %}">Register</a></li>
            </ul>
        {% endif %}
    </header>

    {% block content %}
    {% endblock %}

    <footer class="content">
        <p>©2026 ArtHub Project. All rights reserved.</p>
    </footer>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const bell = document.querySelector(".fa-bell");
    if (!bell) return;
    const dropdown = bell.closest(".dropdown").querySelector(".dropdown-menu");
    const countEl = document.getElementById("notification-count");
    let loaded = false;

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== "") {
            const cookies = document.cookie.split(";");
            for (let cookie of cookies) {
                cookie = cookie.trim();
                if (cookie.startsWith(name + "=")) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    async function loadCount() {
        try {
            const res = await fetch("/api/notifications/unread-count/");
            const data = await res.json();
            countEl.innerText = data.count > 0 ? data.count : "";
        } catch (err) {
            console.error("Error loading notification count:", err);
        }
    }

    async function loadNotifications() {
        try {
            const res = await fetch("/api/notifications/");
            const data = await res.json();
            dropdown.innerHTML = "";
            if (!data.length) {
                dropdown.innerHTML = "<p>Nothing new here.</p>";
                return;
            }

            data.forEach(n => {
                const li = document.createElement("li");

                const el = document.createElement("a");
                el.href = n.target_url;

                const wrapper = document.createElement("div");
                wrapper.classList.add("notification-item");

                const img = document.createElement("img");
                img.src = n.sender_avatar || "/static/images/default-avatar.png";
                img.classList.add("notif-avatar");

                const text = document.createElement("span");
                text.innerText = n.message;

                wrapper.appendChild(img);
                wrapper.appendChild(text);

                el.appendChild(wrapper);
                li.appendChild(el);
                dropdown.appendChild(li);

                el.addEventListener("click", async (e) => {
                    e.preventDefault();

                    try {
                        await fetch(`/api/notifications/${n.id}/read/`, {
                            method: "PATCH",
                            headers: {
                                "Content-Type": "application/json",
                                "X-CSRFToken": getCookie("csrftoken")
                            },
                            body: JSON.stringify({ is_read: true })
                        });

                        let currentCount = parseInt(countEl.innerText) || 0;
                        if (currentCount > 0) {
                            countEl.innerText = currentCount - 1 || "";
                        }

                        li.remove();

                        if (!dropdown.children.length) {
                            dropdown.innerHTML = "<p>Nothing new here.</p>";
                        }

                    } catch (err) {
                        console.error("Error marking notification as read:", err);
                    }

                    window.location.href = n.target_url;
                });
            });

        } catch (err) {
            console.error("Error loading notifications:", err);
        }
    }

    bell.addEventListener("click", async () => {
        const isVisible = dropdown.style.display === "block";
        dropdown.style.display = isVisible ? "none" : "block";

        if (!loaded && !isVisible) {
            await loadNotifications();
            loaded = true;
        }
    });

    document.addEventListener("click", (e) => {
        const isClickInsideDropdown = dropdown.contains(e.target);
        const isClickOnBell = bell.contains(e.target);

        if (!isClickInsideDropdown && !isClickOnBell) {
            dropdown.style.display = "none";
        }
    });

    loadCount();
});

document.addEventListener("DOMContentLoaded", () => {
    const menuBtn = document.querySelector('.menu-btn');
    const sidebar = document.querySelector('.sidebar');

    menuBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        sidebar.classList.toggle('collapsed');
    });

    document.addEventListener('click', (e) => {
        const isClickInsideSidebar = sidebar.contains(e.target);
        const isClickOnMenuBtn = menuBtn.contains(e.target);

        if (!isClickInsideSidebar && !isClickOnMenuBtn && !sidebar.classList.contains('collapsed')) {
            sidebar.classList.add('collapsed');
        }
    });

    sidebar.addEventListener('click', (e) => {
        e.stopPropagation();
    });
});

</script>
</body>
</html>
